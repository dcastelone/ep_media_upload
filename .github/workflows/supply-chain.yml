name: Supply-chain security

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0

      - name: Enable the pinned package manager
        run: |
          corepack enable
          corepack install

      - name: Install the frozen dependency graph
        run: pnpm install --frozen-lockfile

      - name: Reject known dependency advisories
        run: pnpm audit --audit-level=low

      - name: Run tests
        run: pnpm test

      - name: Run lint when provided
        run: pnpm run --if-present lint

      - name: Enforce Socket policy
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        run: |
          test -n "$SOCKET_SECURITY_API_KEY"
          pnpm exec socket ci --no-interactive
